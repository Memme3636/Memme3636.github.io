<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web3 Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.15.0/ethers.umd.min.js"></script>
</head>
<body>

<h1>HelloWorld Smart Contract</h1>

<button onclick="connectWallet()">連接 MetaMask</button>

<p id="message">尚未讀取</p>
<button onclick="readMessage()">讀取</button>

<input id="newMessage" placeholder="輸入新訊息">
<button onclick="updateMessage()">更新</button>

<script>
const CONTRACT_ADDRESS = "0xe321F62eD0B470B877D68fa7FF99DE6754b4eE22";

const CONTRACT_ABI = [
{"inputs":[],"name":"message","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},
{"inputs":[{"internalType":"string","name":"_newMessage","type":"string"}],"name":"updateMessage","outputs":[],"stateMutability":"nonpayable","type":"function"}
];

let provider, signer, contract, readOnlyContract;

async function connectWallet() {
  await window.ethereum.request({ method: "eth_requestAccounts" });
  provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();

  contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
  readOnlyContract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);
}

async function readMessage() {
  const msg = await readOnlyContract.message();
  document.getElementById("message").innerText = msg;
}

async function updateMessage() {
  const newMsg = document.getElementById("newMessage").value;
  const tx = await contract.updateMessage(newMsg);
  await tx.wait();
  readMessage();
}
</script>

</body>
</html>
